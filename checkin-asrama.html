<!DOCTYPE html>
<html lang="id" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check-in Kembali ke Asrama | Mu'allimin</title>
    <meta name="description" content="Aplikasi check-in kedatangan santri kembali ke asrama Madrasah Mu'allimin Muhammadiyah Yogyakarta.">
    <meta name="robots" content="noindex, nofollow">

    <link rel="icon" type="image/png" href="assets/logos/favicon.png">
    <link href="./dist/tailwind.css" rel="stylesheet">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

    <style>
        body { font-family: 'Plus Jakarta Sans', sans-serif; }

        /* Tab styles */
        .tab-active {
            background: #1e293b;
            color: white;
            box-shadow: 0 2px 8px rgba(0,0,0,0.15);
        }
        .tab-inactive {
            background: transparent;
            color: #64748b;
        }
        .tab-inactive:hover {
            background: #f1f5f9;
            color: #334155;
        }

        /* Custom scrollbar */
        .custom-scroll::-webkit-scrollbar { width: 4px; }
        .custom-scroll::-webkit-scrollbar-track { background: transparent; }
        .custom-scroll::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 9999px; }

        /* Fade in animation */
        @keyframes fadeInUp {
            from { opacity: 0; transform: translateY(16px); }
            to   { opacity: 1; transform: translateY(0); }
        }
        .animate-fade-in-up { animation: fadeInUp 0.4s ease-out forwards; }

        /* Print styles */
        @media print {
            #view-dashboard { padding: 0; }
            .no-print { display: none !important; }
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen text-slate-700 antialiased">

<!-- Toast / Notifikasi -->
<div id="toast-container" class="fixed bottom-0 left-0 right-0 z-[9999] pointer-events-none"></div>

<!-- ═══════════════════════════════════════════════════════════════
     PRELOADER
════════════════════════════════════════════════════════════════ -->
<div id="preloader" class="fixed inset-0 z-[9998] bg-slate-50 flex flex-col items-center justify-center gap-4">
    <img src="assets/logos/logopreload.webp" alt="Logo" class="h-16 w-auto opacity-80">
    <div class="flex items-center gap-3">
        <i class="fas fa-circle-notch fa-spin text-slate-400 text-lg"></i>
        <p id="preloader-status" class="text-sm text-slate-500 font-semibold">Memuat data santri...</p>
    </div>
    <p class="text-xs text-slate-400">Mohon tunggu, jangan tutup halaman ini</p>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     VIEW: LOGIN
════════════════════════════════════════════════════════════════ -->
<div id="view-login" class="hidden min-h-screen flex flex-col items-center justify-center p-4 bg-gradient-to-br from-slate-800 via-slate-900 to-slate-800">
    
    <!-- Background decorative circles -->
    <div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none">
        <div class="absolute top-[-10%] right-[-10%] w-80 h-80 bg-blue-500/10 rounded-full blur-3xl"></div>
        <div class="absolute bottom-[-10%] left-[-10%] w-80 h-80 bg-emerald-500/10 rounded-full blur-3xl"></div>
    </div>

    <div class="relative w-full max-w-sm animate-fade-in-up">

        <!-- Header card -->
        <div class="text-center mb-6">
            <div class="text-4xl mb-3">🌙</div>
            <h1 class="text-2xl font-black text-white tracking-tight">Check-in Asrama</h1>
            <p class="text-slate-400 text-sm mt-1">Madrasah Mu'allimin Muhammadiyah Yogyakarta</p>
        </div>

        <!-- Login card -->
        <div class="bg-white rounded-3xl shadow-2xl shadow-black/30 p-6 space-y-4">
            
            <div class="text-center pb-2 border-b border-slate-100">
                <p class="text-xs font-bold text-slate-400 uppercase tracking-widest">Login Musyrif Asrama</p>
            </div>

            <!-- Asrama selector -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">
                    <i class="fas fa-building mr-1 text-slate-400"></i> Pilih Asrama
                </label>
                <select id="select-asrama"
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200
                           focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10
                           outline-none text-sm font-semibold text-slate-700 transition"
                    onchange="document.getElementById('login-error').textContent=''">
                    <option value="">-- Pilih Asrama --</option>
                    <!-- Options diisi oleh JS -->
                </select>
            </div>

            <!-- PIN input -->
            <div>
                <label class="block text-xs font-bold text-slate-500 uppercase mb-1.5 ml-1">
                    <i class="fas fa-lock mr-1 text-slate-400"></i> PIN Musyrif
                </label>
                <input type="password" id="input-pin"
                    inputmode="numeric" pattern="[0-9]*" autocomplete="off"
                    placeholder="Masukkan PIN"
                    class="w-full px-4 py-3 rounded-xl bg-slate-50 border border-slate-200
                           focus:bg-white focus:border-blue-500 focus:ring-4 focus:ring-blue-500/10
                           outline-none text-sm font-bold tracking-widest text-slate-700 transition"
                    onkeydown="if(event.key==='Enter') doLogin()"
                    oninput="document.getElementById('login-error').textContent=''">
            </div>

            <!-- Error message -->
            <p id="login-error" class="text-xs text-red-500 font-semibold text-center min-h-[1rem]"></p>

            <!-- Login button -->
            <button onclick="doLogin()"
                class="w-full py-3.5 bg-slate-800 hover:bg-slate-700 active:scale-95
                       text-white font-bold rounded-xl shadow-lg shadow-slate-800/20
                       transition-all flex items-center justify-center gap-2">
                <i class="fas fa-sign-in-alt"></i>
                Masuk
            </button>

        </div>

        <!-- Footer note -->
        <p class="text-center text-xs text-slate-500 mt-5">
            Data santri diambil dari database Mu'allimin.
            Hubungi admin jika ada masalah.
        </p>

    </div>
</div>

<!-- ═══════════════════════════════════════════════════════════════
     VIEW: DASHBOARD
════════════════════════════════════════════════════════════════ -->
<div id="view-dashboard" class="hidden min-h-screen flex flex-col bg-slate-100">

    <!-- ── Sticky Header ── -->
    <header class="sticky top-0 z-50 bg-white border-b border-slate-200 shadow-sm no-print">
        <div class="max-w-2xl mx-auto px-4 h-16 flex items-center justify-between gap-3">
            
            <!-- Logo + Asrama name -->
            <div class="flex items-center gap-3 min-w-0">
                <img src="assets/logos/logopreload.webp" alt="Logo" class="h-8 w-auto flex-shrink-0">
                <div class="min-w-0">
                    <p class="text-xs text-slate-400 font-semibold leading-none mb-0.5">Check-in Asrama</p>
                    <p id="dashboard-asrama-name" class="font-black text-slate-800 text-sm leading-tight truncate"></p>
                </div>
            </div>

            <!-- Logout -->
            <button onclick="doLogout()"
                class="flex-shrink-0 flex items-center gap-1.5 px-3 py-1.5 text-xs font-bold
                       text-slate-500 hover:text-red-500 border border-slate-200 hover:border-red-200
                       rounded-xl transition-colors">
                <i class="fas fa-sign-out-alt"></i>
                <span class="hidden sm:inline">Keluar</span>
            </button>
        </div>
    </header>

    <!-- ── Stats bar ── -->
    <div class="bg-white border-b border-slate-200 no-print">
        <div class="max-w-2xl mx-auto px-4 py-3">
            <div class="flex items-center gap-4">
                <!-- Counters -->
                <div class="flex items-center gap-4 flex-1">
                    <div class="text-center">
                        <p class="text-lg font-black text-slate-800" id="stats-total">0</p>
                        <p class="text-[10px] text-slate-400 font-bold uppercase">Total</p>
                    </div>
                    <div class="h-8 w-px bg-slate-200"></div>
                    <div class="text-center">
                        <p class="text-lg font-black text-emerald-600" id="stats-hadir">0</p>
                        <p class="text-[10px] text-emerald-400 font-bold uppercase">Hadir</p>
                    </div>
                    <div class="h-8 w-px bg-slate-200"></div>
                    <div class="text-center">
                        <p class="text-lg font-black text-red-500" id="stats-belum">0</p>
                        <p class="text-[10px] text-red-400 font-bold uppercase">Belum</p>
                    </div>
                </div>
                <!-- Percent + Bar -->
                <div class="flex-1 max-w-[140px]">
                    <div class="flex justify-between items-center mb-1">
                        <span class="text-[10px] text-slate-400">Progress</span>
                        <span class="text-xs font-black text-emerald-600" id="stats-pct">0%</span>
                    </div>
                    <div class="w-full bg-slate-100 rounded-full h-2 overflow-hidden">
                        <div id="stats-progress-bar"
                             class="h-full rounded-full bg-gradient-to-r from-emerald-400 to-emerald-500 transition-all duration-500"
                             style="width:0%"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ── Tab navigation ── -->
    <div class="bg-white border-b border-slate-200 no-print">
        <div class="max-w-2xl mx-auto px-4">
            <div class="flex gap-1 py-2">
                <button id="tab-btn-seruan" onclick="switchTab('seruan')"
                    class="tab-inactive flex-1 flex items-center justify-center gap-1.5 py-2 px-3 rounded-xl text-xs font-bold transition-all">
                    <i class="fas fa-bullhorn text-[11px]"></i>
                    <span>Seruan</span>
                </button>
                <button id="tab-btn-checkin" onclick="switchTab('checkin')"
                    class="tab-active flex-1 flex items-center justify-center gap-1.5 py-2 px-3 rounded-xl text-xs font-bold transition-all">
                    <i class="fas fa-clipboard-check text-[11px]"></i>
                    <span>Check-in</span>
                </button>
                <button id="tab-btn-rekap" onclick="switchTab('rekap')"
                    class="tab-inactive flex-1 flex items-center justify-center gap-1.5 py-2 px-3 rounded-xl text-xs font-bold transition-all">
                    <i class="fas fa-chart-bar text-[11px]"></i>
                    <span>Rekap</span>
                </button>
            </div>
        </div>
    </div>

    <!-- ── Search & filter (only on checkin tab) ── -->
    <div id="checkin-controls" class="bg-white border-b border-slate-200 no-print">
        <div class="max-w-2xl mx-auto px-4 py-3 space-y-2">
            <!-- Search -->
            <div class="relative">
                <i class="fas fa-search absolute left-3 top-1/2 -translate-y-1/2 text-slate-300 text-sm pointer-events-none"></i>
                <input type="search" id="search-santri" placeholder="Cari nama, NIS, atau kelas..."
                    oninput="handleSearch(this.value)"
                    class="w-full pl-9 pr-4 py-2.5 rounded-xl bg-slate-50 border border-slate-200
                           focus:bg-white focus:border-blue-400 focus:ring-4 focus:ring-blue-400/10
                           outline-none text-sm transition">
            </div>
            <!-- Filter buttons -->
            <div class="flex gap-2">
                <button id="filter-all" onclick="handleFilterStatus('all')"
                    class="bg-slate-800 text-white flex-1 py-2 rounded-xl text-xs font-bold transition-colors">
                    Semua
                </button>
                <button id="filter-hadir" onclick="handleFilterStatus('hadir')"
                    class="bg-white text-slate-500 border border-slate-200 flex-1 py-2 rounded-xl text-xs font-bold transition-colors hover:bg-slate-50">
                    ✅ Hadir
                </button>
                <button id="filter-belum" onclick="handleFilterStatus('belum')"
                    class="bg-white text-slate-500 border border-slate-200 flex-1 py-2 rounded-xl text-xs font-bold transition-colors hover:bg-slate-50">
                    ⏳ Belum
                </button>
            </div>
        </div>
    </div>

    <!-- ── Tab panels ── -->
    <main class="flex-1 overflow-y-auto custom-scroll">
        <div class="max-w-2xl mx-auto px-4 py-4">

            <!-- Panel: Seruan -->
            <div id="tab-panel-seruan" class="hidden">
                <!-- Rendered by JS -->
            </div>

            <!-- Panel: Check-in list -->
            <div id="tab-panel-checkin">
                <!-- Rendered by JS -->
            </div>

            <!-- Panel: Rekap -->
            <div id="tab-panel-rekap" class="hidden">
                <!-- Rendered by JS -->
            </div>

        </div>
    </main>

</div>

<!-- ─── Script ──────────────────────────────────────────────── -->
<script type="module" src="js/checkin-asrama.js"></script>



</body>
</html>
